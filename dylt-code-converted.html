
<!DOCTYPE html>
<html>
<head>
  <title>Note Images</title>
  <style>
    body {
      font-family: Arial, sans-serif;
        margin: 20px;
    }
    .container {
    display: flex;
    gap: 30px;
    align-items: flex-start;
  }
  #uploadSection, #tableContainer {
    flex: 1;
  }
    #uploadSection {
    max-width: 45%;
  }
    table {
      width: 100%;
      border-collapse: collapse;
      /*margin: 20px 0;*/
      font-size: 16px;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ccc;
          text-align: left;
    }
    th {
      background-color: #f4f4f4;
    }
    #uploadSection {
      /*margin: 20px 0;*/
      border: 1px solid #ccc;
    padding: 20px;
    }
    #uploadButton {
       padding: 10px 20px;
    background-color: #0078D4;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 10px;
    }
    #uploadButton:hover {
      background-color: #005ea2;
    }
    #scrrenshoteditor {
      border: 2px dashed #ccc;
      padding: 10px;
      min-height: 150px;
      margin-top: 10px;
    }
    .file-name {
      color: blue;
      cursor: pointer;
      text-decoration: underline;
    }
    #uploadStatus {
    margin-top: 10px;
    font-weight: bold;
    color: green;
  }
  </style>
</head>
<body>

<div class="container">
    <!-- LEFT PANEL -->
    <div id="uploadSection">
      <h3>Upload Area</h3>
      <input type="file" id="fileInput" multiple accept="image/*,application/pdf">
      <div id="scrrenshoteditor" contenteditable="true">Paste or drop images here...</div>
      <button id="uploadButton">Upload</button>
      <div id="uploadStatus"></div>
    </div>

    <!-- RIGHT PANEL -->
    <div id="tableContainer">
      <h3>Attachments</h3>
      Loading attachments...
    </div>
  </div>

<script>
let savedImages = [];

document.addEventListener("DOMContentLoaded", function () {
  const editor = document.getElementById("scrrenshoteditor");

  // Paste and drop handlers for screenshots
  editor.addEventListener("paste", async (e) => {
    const items = e.clipboardData.items;
    for (let item of items) {
      if (item.type.indexOf("image") !== -1) {
        const file = item.getAsFile();
        insertImage(file);
        e.preventDefault();
      }
    }
  });

  editor.addEventListener("dragover", (e) => e.preventDefault());
  editor.addEventListener("drop", (e) => {
    e.preventDefault();
    const files = e.dataTransfer.files;
    for (let file of files) {
      if (file.type.startsWith("image/")) {
        insertImage(file);
      }
    }
  });

  function insertImage(file) {
    const reader = new FileReader();
    reader.onload = function (e) {
      const img = document.createElement("img");
      img.src = e.target.result;
      img.style.maxWidth = "100%";
      savedImages.push(e.target.result);
      editor.appendChild(img);
    };
    reader.readAsDataURL(file);
  }

  document.getElementById("uploadButton").addEventListener("click", uploadAllFiles);
  loadExistingAttachments();
});

async function uploadAllFiles() {
  const fileInput = document.getElementById("fileInput");
  const files = fileInput.files;
  const uploadStatusDiv = document.getElementById("uploadStatus");
  uploadStatusDiv.innerHTML = "Uploading...";

  if (typeof parent.Xrm === "undefined") {
    alert("Xrm API is not available.");
    return;
  }

  const currentUrl = window.location.origin;
  let innerFormContext = parent.Xrm.Page;
if (!innerFormContext || !innerFormContext.data || !innerFormContext.data.entity) {
  alert("Cannot access parent record context.");
  return;
}

if (innerFormContext.data.entity.getIsDirty()) {
  alert("Please save the record before uploading attachments.");
  return;
}

let rawId = innerFormContext.data.entity.getId();
if (!rawId) {
  alert("No parent record ID found.");
  return;
}
let innerRowId = rawId.replace(/[{}]/g, "");

  try {
    // Upload files
    for (const file of files) {
      const recordId = await createDataverseRecord(file.name, null, innerRowId);
      await uploadFileToRecord(recordId, file);
    }

    // Upload screenshots
    for (let i = 0; i < savedImages.length; i++) {
      const base64Img = savedImages[i];
      await createDataverseRecord(`Screenshot ${i + 1}.png`, base64Img, innerRowId);
    }

    uploadStatusDiv.innerHTML = "Upload successful!";
    if (files.length > 0 || savedImages.length > 0) {
  await updateFolderIcon(innerRowId);
}
    location.reload();

  } catch (error) {
    uploadStatusDiv.innerHTML = `Error: ${error.message}`;
    console.error(error);
  }
  // Update parent icon after upload


}
async function updateFolderIcon(rowId) {
  const patchUrl = `${window.location.origin}/api/data/v9.0/dylt_changenoteses(${rowId})`;
  const data = {
    "dylt_noteicon": "📂"
  };

  const response = await fetch(patchUrl, {
    method: "PATCH",
    headers: {
      "OData-MaxVersion": "4.0",
      "OData-Version": "4.0",
      "Accept": "application/json",
      "Content-Type": "application/json; charset=utf-8",
      "Prefer": "return=representation"
    },
    body: JSON.stringify(data)
  });

  if (!response.ok) {
    const errorDetails = await response.text();
    throw new Error(`Icon update failed: ${errorDetails}`);
  }

  console.log("Parent folder icon updated.");
}

async function createDataverseRecord(filename, base64Image, rowId) {
   const currentUrl = window.location.origin;
  const apiUrl = `${window.location.origin}/api/data/v9.0/dylt_changenotesimageses`;
  const record = {
    "dylt_ChangeNote@odata.bind": `/dylt_changenoteses(${rowId})`,
    "dylt_filename": filename
  };
  if (base64Image) record.dylt_screenfile = base64Image;

  const response = await fetch(apiUrl, {
    method: "POST",
    headers: {
      "OData-MaxVersion": "4.0",
      "OData-Version": "4.0",
      "Content-Type": "application/json; charset=utf-8",
      "Accept": "application/json"
    },
    body: JSON.stringify(record)
  });

  if (!response.ok) {
    const errorText = await response.text();
    throw new Error(`Dataverse create error: ${errorText}`);
  }

  const entityIdHeader = response.headers.get("OData-EntityId");
  return entityIdHeader.split('(').pop().split(')')[0];
}

async function uploadFileToRecord(recordId, file) {
  const apiUrl = `${window.location.origin}/api/data/v9.0/dylt_changenotesimageses(${recordId})/dylt_filedata`;

  const response = await fetch(apiUrl, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/octet-stream",
      "x-ms-file-name": file.name
    },
    body: file
  });

  if (!response.ok) {
    const errorDetails = await response.text();
    throw new Error(`File upload failed: ${errorDetails}`);
  }
}

async function loadExistingAttachments() {
  const tableContainer = document.getElementById("tableContainer");

  if (typeof parent.Xrm === "undefined") {
    tableContainer.innerHTML = "Xrm API not available.";
    return;
  }

  const formContext = parent.Xrm.Page;
  const rowId = formContext.data.entity.getId().replace(/[{ }]/g, "");

  try {
    const response = await parent.Xrm.WebApi.retrieveMultipleRecords("dylt_changenotesimages", `?$filter=_dylt_changenote_value eq '${rowId}'&$select=dylt_screenfile,dylt_filedata,dylt_changenotesimagesid,dylt_filename`);
    if (response.entities.length === 0) {
      tableContainer.innerHTML = "No attachments found.";
      return;
    }

    let html = `<table><thead><tr><th>Attachments</th></tr></thead><tbody>`;
    for (let item of response.entities) {
      html += `<tr><td><span class="file-name" onclick="previewAttachment('${item.dylt_changenotesimagesid}')">${item.dylt_filename}</span></td></tr>`;
    }
    html += `</tbody></table>`;
    tableContainer.innerHTML = html;

  } catch (error) {
    console.error("Load error:", error.message);
    tableContainer.innerHTML = "Error loading attachments.";
  }
}

async function previewAttachment(fileId) {
  try {
    const response = await parent.Xrm.WebApi.retrieveRecord("dylt_changenotesimages", fileId, "?$select=dylt_screenfile");
    let fileUrl = null;

    if (response.dylt_screenfile) {
      fileUrl = response.dylt_screenfile;
    } else {
      const fetchUrl = `${window.location.origin}/api/data/v9.0/dylt_changenotesimageses(${fileId})/dylt_filedata/`;
      const fetchRes = await fetch(fetchUrl, {
        method: 'GET',
        headers: { "Content-Type": "application/json" }
      });

      if (fetchRes.ok) {
        const result = await fetchRes.json();
        if (result.value.startsWith("JVBERi0")) {
          fileUrl = "data:application/pdf;base64," + result.value;
        } else {
          fileUrl = "data:image/*;base64," + result.value;
        }
      } else {
        throw new Error("Could not retrieve binary data.");
      }
    }

    openGallery([fileUrl]);
  } catch (err) {
    console.error("Preview failed:", err.message);
  }
}


function openGallery(urls) {
  const width = 800;
  const height = 600;
  const left = (window.screen.width / 2) - (width / 2);
  const top = (window.screen.height / 2) - (height / 2);
   const popup = window.open("", "_blank", `width=${width},height=${height},left=${left},top=${top},resizable=yes,scrollbars=yes`);

  if (!popup) {
    alert("Popup blocked. Please enable popups.");
    return;
  }

  const content = `
    <html><head><title>Preview</title>
    <style>
      body { margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background: #eee; }
      img, iframe { max-width: 90%; max-height: 90%; }
    </style>
    </head>
    <body>
      ${urls[0].includes("application/pdf") || urls[0].endsWith(".pdf") ? 
        `<iframe src="${urls[0]}" width="100%" height="100%"></iframe>` :
        `<img src="${urls[0]}" alt="Preview">`
      }
    </body></html>`;

  popup.document.write(content);
  popup.document.close();
}
</script>

</body>
</html>
