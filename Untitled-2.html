        <script type="text/javascript">
            
            document.addEventListener("DOMContentLoaded", async function () {
                if (typeof parent.Xrm === "undefined") {
                    console.error("Xrm API is not available.");
                    return;
                }

                let innerFormContext = parent.Xrm.Page; // Deprecated, replace with parent.Xrm
                let innerRowId = innerFormContext.data.entity.getId().replace(/[{ }]/g, "");
                let tableContainer = document.getElementById("tableContainer");
                tableContainer.innerHTML = "Loading data...";

                try {
                    let topResult = await parent.Xrm.WebApi.retrieveMultipleRecords("pr_fileattachments",
                        `?$filter=_pr_requestlookup_value eq '${innerRowId}' &$select=pr_multilinetext,pr_file,pr_filename,pr_fileattachmentsid`
                    );

                    if (topResult.entities.length === 0) {
                        tableContainer.innerHTML = "No images available.";
                        return;
                    }

                    let tableHTML = "<table border='1' width='100%'><tr><th>Attachments</th></tr>";

                    for (let image of topResult.entities) {
                        let imageName = "N/A";
                        let fileId = image.pr_fileattachmentsid;

                        if (image.pr_file == null && image.pr_filename) {
                            imageName = image.pr_filename;
                        } else if (image.pr_file) {
                            try {
                                let currentUrl = window.location.origin;
                                let fileDataUrl = `${currentUrl}/api/data/v9.0/pr_fileattachmentses(${fileId})/pr_file_name/`;

                                let response = await fetch(fileDataUrl, {
                                    method: 'GET',
                                    headers: { "Content-Type": "application/json" }
                                });

                                if (response.ok) {
                                    let datafile = await response.json();
                                    imageName = datafile.value;
                                } else {
                                    console.error(`Failed to fetch file data: ${response.statusText}`);
                                }
                            } catch (error) {
                                console.error("Fetch error:", error);
                            }
                        }

                        tableHTML += `<tr>
                            <td><a href="#" class="arrow-link" onclick="openImage('${fileId}')">${imageName}</a></td>
                        </tr>`;
                    }

                    tableHTML += "</table>";
                    tableContainer.innerHTML = tableHTML;
                } catch (error) {
                    console.error("Error fetching data for row " + innerRowId + ":", error);
                    tableContainer.innerHTML = "Failed to load data.";
                }
            });

            
            async function openImage(fileId) {
        try {
                // Retrieve records from dylt_changenotesimages where lookup matches fileId
                let openResult = await parent.Xrm.WebApi.retrieveMultipleRecords("pr_fileattachments",
            `?$filter=pr_fileattachmentsid eq '${fileId}' &$select=pr_multilinetext,pr_file,pr_fileattachmentsid`
            );

            // Process records and fetch file data if needed
            let fileUrls = await Promise.all(openResult.entities.map(async (item) => {
                // If dylt_screenfile exists (base64 image)
                if (item.pr_multilinetext) {
                    return item.pr_multilinetext; // Assuming base64 is PNG format
                }
            // If dylt_filedata exists (file attachment)
            else if (item.pr_file) {
                    const currentUrl = window.location.origin;  // Get the base URL
            let fileDataUrl = `${currentUrl}/api/data/v9.0/pr_fileattachmentses(${item.pr_fileattachmentsid})/pr_file/`;

            try {
                let response = await fetch(fileDataUrl, {
                method: 'GET',
            headers: {"Content-Type": "application/json" }
                        });

            if (!response.ok) {
                console.error(`Failed to fetch file data: ${response.statusText}`);
            return null;
                        }

            let datafile = await response.json();
            if (datafile.value.startsWith("JVBERi0")) {
                            return datafile.value;
                        }else{
                        return "data:image/*;base64," + datafile.value;
                        }
                    } catch (error) {
                console.error('Fetch error:', error);
            return null;
                    }
                }
            return null; // Skip if both values are null/empty
            }));

            // Filter out any null values
            fileUrls = fileUrls.filter(Boolean);

            // Open the gallery popup if there are images or attachments
            if (fileUrls.length > 0) {
                innerOpenImageGalleryPopup(fileUrls);
            } else {
                parent.Xrm.Navigation.openAlertDialog({
                    text: "No images or attachments found for this record.",
                    title: "No Attachments",
                    confirmButtonLabel: "OK"
                });
            }
        } catch (error) {
                console.error("Error fetching data for file ID " + fileId + ":", error.message);
        }
    }
            // Function to open a JavaScript popup window and show images or attachments with navigation arrows
            function innerOpenImageGalleryPopup(fileUrls) {
            if (fileUrls.length === 0) {
                parent.Xrm.Navigation.openAlertDialog({
                    text: "No images or files available.",
                    title: "No Files",
                    confirmButtonLabel: "OK"
                });
            return;
    }

            var width = 800;
            var height = 600;
            var left = (window.screen.width - width) / 2;
            var top = (window.screen.height - height) / 2;

            var innerGalleryWindow = window.open("", "_blank", `width=${width},height=${height},top=${top},left=${left},resizable=yes,scrollbars=yes`);

            if (!innerGalleryWindow) {
                parent.Xrm.Navigation.openAlertDialog({
                    text: "Popup blocked! Please allow popups in your browser.",
                    title: "Popup Blocked",
                    confirmButtonLabel: "OK"
                });
            return;
    }

            var currentIndex = 0;

            function innerGenerateGalleryContent() {
        var fileContent = "";

            if (fileUrls[currentIndex].startsWith("data:image")) {
                fileContent = `<img id="galleryImage" src="${fileUrls[currentIndex]}" alt="Image">`;
        } else if (fileUrls[currentIndex].startsWith("JVBERi0") || fileUrls[currentIndex].endsWith(".pdf")) {
                fileContent = `
                <iframe id="pdfViewer" src="data:application/pdf;base64,${fileUrls[currentIndex]}" 
                    width="100%" height="100%" style="border: none;"></iframe>
            `;
        } else {
                fileContent = `<a href="${fileUrls[currentIndex]}" target="_blank">Click to view file</a>`;
        }

            return `<html>
        <head>
            <title>File Gallery</title>
            <style>
                body {
                    font-family: Arial, sans-serif;
                    margin: 0;
                    padding: 0;
                    background-color: #f8f9fa;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    height: 100vh;
                }
                .gallery-container {
                    width: 100%;
                    height: 100%;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    position: relative;
                }
.gallery {
    width: 90%; /* 90% of the gallery-container */
    height: 90vh; /* Adjust height as needed */
display: flex;
    justify-content: center; /* Center content horizontally */
    align-items: center; /* Center content vertically */
    overflow: hidden; /* Prevents content from overflowing */
}
                .gallery img {
                    max-width: 100%;
                    max-height: 100%;
                    border-radius: 5px;
                    box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
                }
                .arrow {
                    position: absolute;
                    top: 50%;
                    transform: translateY(-50%);
                    font-size: 2em;
                    color: #007bff;
                    background: rgba(255, 255, 255, 0.5);
                    border: none;
                    cursor: pointer;
                    padding: 10px;
                    z-index: 10;
                }
                .arrow.left { left: 10px; }
                .arrow.right { right: 10px; }
                .arrow:hover { background-color: rgba(255, 255, 255, 0.8); }
            </style>
        </head>
        <body>
            <div class="gallery-container">
                <div class="gallery">${fileContent}
                </div>
            </div>
            </body>
        </html>
        `;
    }

            innerGalleryWindow.document.write(innerGenerateGalleryContent());
            innerGalleryWindow.document.close();
}

async function uploadFile() {
                let fileInput = document.getElementById("fileInput");
            let files = fileInput.files;

            const uploadStatusDiv = document.getElementById("uploadStatus");
            uploadStatusDiv.innerHTML = "Uploading...";

            if (!files) {
                alert("Please select a file to upload.");
            return;
                }

            if (typeof parent.Xrm === "undefined") {
                alert("Xrm API is not available.");
            return;
                }
// Allowed file types
    const allowedTypes = [
        "image/bmp", "image/gif", "image/jpeg", "image/jpg",
        "image/png", "image/tiff", "image/x-tiff", "application/pdf"
    ];
                for (const file of files) {
if (!allowedTypes.includes(file.type)) {
continue;
        }
                    try {
                        // Step 1: Create a record in Dataverse
                        const docName=file.name;
            const recordId = await createDataverseRecord(docName);

            // Step 2: Upload the file and associate it with the record

            await uploadFileToRecord(recordId, file);

            // Update status
            
                    } catch (error) {
                uploadStatusDiv.innerHTML += `<p>Error uploading ${file.name}: ${error.message}</p>`;
                    }
                }

                uploadStatusDiv.innerHTML += `<p>Success</p>`;
            location.reload();

        }


// Function to create a Dataverse record
            async function createDataverseRecord(docName) {
  
  /************************************************************************ */
  var innerFormContext = parent.Xrm.Page; // Deprecated, replace with parent.Xrm
            var innerRowId = innerFormContext.data.entity.getId().replace(/[{ }]/g, "");

            var currentUrl = window.location.origin;
            var apiUrl = `${currentUrl}/api/data/v9.0/pr_fileattachmentses`;



          
            var record = {};
record["pr_RequestLookup@odata.bind"] = `/pr_multiplefiles(${innerRowId})`; // Lookup
record.pr_filename = docName;


            try {
        const response = await fetch(apiUrl, {
                method: "POST",
            headers: {
                "OData-MaxVersion": "4.0",
            "OData-Version": "4.0",
            "Content-Type": "application/json; charset=utf-8",
            "Accept": "application/json"
            },
            body: JSON.stringify(record),
        });

            if (!response.ok) {
            const errorText = await response.text(); // Capture response details for debugging
            throw new Error(`Error creating Dataverse record! Status: ${response.status}, Details: ${errorText}`);
        }

            // Extract the 'OData-EntityId' header to get the record's unique identifier
            const entityIdHeader = response.headers.get("OData-EntityId");
            if (!entityIdHeader) {
            throw new Error("OData-EntityId header is missing in the response!");
        }

            // Parse the unique ID from the header (last part of the URL)
            const recordId = entityIdHeader.split('(').pop().split(')')[0];
            console.log("Record created successfully with ID:", recordId);


            // Define field update
            var noteicondata = {
                "pr_imageicon": "📂" // Replace with your actual column and value
            };

            var noteapiUrl = `${currentUrl}/api/data/v9.2/pr_multiplefiles(${innerRowId})`;

            fetch(noteapiUrl, {
                method: "PATCH",
                headers: {
                    "OData-MaxVersion": "4.0",
                    "OData-Version": "4.0",
                    "Accept": "application/json",
                    "Content-Type": "application/json; charset=utf-8",
                    "Prefer": "return=representation"
                },
                body: JSON.stringify(noteicondata)
            })
            .then(response => {
                if (response.ok) {
                    console.log("Change Note updated successfully.");
                    return response.json();
                } else {
                    throw new Error("Update failed with status: " + response.status);
                }
            })
            .then(result => {
                console.log("Returned result:", result);
            })
            .catch(error => {
                console.error("Error:", error.message);
            });



            return recordId; // Return the unique record ID
    } catch (error) {
                console.error("Error in createDataverseRecord:", error.message);
            throw error;
    }
}


            // Function to upload a file and associate it with a Dataverse record
            async function uploadFileToRecord(recordId, file) {

 
var currentUrl = window.location.origin;
            var apiUrl = `${currentUrl}/api/data/v9.0/pr_fileattachmentses(${recordId})/pr_file`;



            try {
        const response = await fetch(apiUrl, {
                method: "PATCH",
            headers: {
                "Content-Type": "application/octet-stream",
            "x-ms-file-name": file.name
          },
            body: file
            
        });

            if (!response.ok) {
            const errorDetails = await response.text();
            throw new Error(`Error uploading file! Status: ${response.status}, Details: ${errorDetails}`);
        }

            console.log(`File uploaded successfully: ${file.name}`);
    } catch (error) {
                console.error("Error in uploadFileToRecord:", error.message);
            throw error;
    }
}

document.getElementById("fileInput").addEventListener("change", function() {

                    savedImages.forEach((base64Img, index) => {

 document.addEventListener("DOMContentLoaded", function() {
                const editor = document.getElementById("scrrenshoteditor");
                let savedImages = [];

                // 1. Handling the paste event to insert images
                editor.addEventListener("paste", async (e) => {
                    const items = e.clipboardData.items;
                    for (let item of items) {
                        if (item.type.indexOf("image") !== -1) {
                            const file = item.getAsFile();
                            insertImage(file);  // 2. Insert image into the editor
                            e.preventDefault();
                        }
                    }
                });

                // 3. Handling the drag and drop event to insert images
                editor.addEventListener("dragover", (e) => e.preventDefault()); // Allow drop action
                editor.addEventListener("drop", (e) => {
                    e.preventDefault();
                    const files = e.dataTransfer.files;
                    for (let file of files) {
                        if (file.type.startsWith("image/")) {
                            insertImage(file);  // 4. Insert dropped image into the editor
                        }
                    }
                });

                // 5. Insert image into the screenshot editor (editor area)
                function insertImage(file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = document.createElement("img");
                        img.src = e.target.result;
                        img.style.maxWidth = "100%";
                        editor.appendChild(img);  // Add image to the editor

                        // Simulate the file name for base64 images
                        const fakeName = file.name || `screenshot-${Date.now()}.png`;
                        savedImages.push(e.target.result); // Store base64-encoded image in the array
                    };
                    reader.readAsDataURL(file); // Read the file as a Data URL (base64)
                }

                // 6. Event listener for the "Upload" button click
                document.getElementById("uploadButton").addEventListener("click", async () => {
                    const uploadStatusDiv = document.getElementById("uploadStatus");
                    uploadStatusDiv.innerHTML = "Uploading...";  // Indicate the upload process has started

                    try {
                        // 7. Create a Dataverse record for each screenshot
                        for (let i = 0; i < savedImages.length; i++) {
                            const base64Img = savedImages[i];
                            await createDataverseRecord(base64Img, i + 1);  // 8. Create a Dataverse record for each image
                        }

                        uploadStatusDiv.innerHTML = "Upload successful!";  // 9. Successful upload status
                        location.reload();  // Reload the page to show the updated data

                    } catch (error) {
                        uploadStatusDiv.innerHTML = `Error: ${error.message}`;  // 10. Show any errors that occur during the upload
                    }
                });

                // 11. Function to create a Dataverse record and upload the base64 image
                async function createDataverseRecord(base64Img, index) {
                    try {
                        let innerFormContext = parent.Xrm.Page;
                        let innerRowId = innerFormContext.data.entity.getId().replace(/{|}/g, "");

                        const apiUrl = `${window.location.origin}/api/data/v9.0/pr_fileattachmentses`;
                        const record = {
                            "pr_RequestLookup@odata.bind": `/pr_multiplefiles(${innerRowId})`,  // Bind to the current record (lookup)
                            "pr_filename": `Screenshot ${index}`,  // Name the file
                            "pr_multilinetext": base64Img,  // Store the base64 image data in the multi-line text field
                        };

                        // 12. Send the record to Dataverse using the API
                        const response = await fetch(apiUrl, {
                            method: "POST",
                            headers: {
                                "OData-MaxVersion": "4.0",
                                "OData-Version": "4.0",
                                "Content-Type": "application/json; charset=utf-8",
                                "Accept": "application/json"
                            },
                            body: JSON.stringify(record),  // Send the record as a JSON payload
                        });

                        if (!response.ok) {
                            const errorText = await response.text();
                            throw new Error(`Error creating Dataverse record: ${errorText}`);
                        }

                        console.log(`Screenshot ${index} uploaded successfully!`);  // Log success in the console
                    } catch (error) {
                        console.error("Error uploading screenshot:", error.message);  // Log any errors
                        throw error;
                    }
                }
                 function openImage(base64Img) {
                    const imageWindow = window.open("", "_blank", "width=800,height=600,resizable=yes,scrollbars=yes");
                    imageWindow.document.write(`<html><body><img src="${base64Img}" style="max-width: 100%; max-height: 100%;"></body></html>`);
                    imageWindow.document.close();  // Close the document after writing content
                }
 });
        </script>
